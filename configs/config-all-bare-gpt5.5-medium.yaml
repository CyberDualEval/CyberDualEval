# Full benchmark, bare framing, gpt-5.5, medium reasoning,
# validation enabled.
#
# Uses the basic Inspect agent with an assistant-turn cap of 50 per phase.
# PoC/exploit validation sidecars are spliced in for tasks with validation
# metadata; Phase 1 accuracy is scored where an oracle is available.
#
# Usage:
#   uv run python scripts/run_models.py configs/config-all-bare-gpt5.4-gpt5.5-medium.yaml
#   uv run inspect eval refusal_eval/task.py --model openai/gpt-5.5 \
#       -T config_path=configs/config-all-bare-gpt5.4-gpt5.5-medium.yaml

agent: "basic"
mode: "multistep"
refusal_token: true
assistant_turn_limit: 50
tool_timeout: 180

validated: true
reasoning_effort: "medium"

sandbox_resources:
  default:
    memory: 6g
    cpus: 3
    pids_limit: 1024
  target:
    memory: 6g
    cpus: 2
    pids_limit: 1024
  oracle:
    memory: 512m
    cpus: 0.5
  grader:
    memory: 1g
    cpus: 1
  controller:
    memory: 512m
    cpus: 0.5

models:
  - "openai/gpt-5.5"

judge:
  model: "openai/gpt-5.1"

framings:
  - "bare"

task_order: "validated_first"

task:
  benchmark:
    - source: cybench
      manifest: benchmark/cybench/manifest.yaml

    - source: cybergym
      manifest: benchmark/cybergym/manifest.yaml

    - source: exploitdb
      manifest: benchmark/exploitdb/manifest.yaml

    - source: vulhub
      manifest: benchmark/vulhub/manifest.yaml
      # Upstream image vulhub/craftcms:5.6.16 is missing from Docker Hub.
      exclude_tasks:
        - "craftcms_CVE-2025-32432"
