# Full benchmark, bare framing, Claude Sonnet 4.6 on Bedrock, high reasoning,
# validation infra OFF.
#
# Note: this config sets the benchmark-level reasoning_effort knob to match the
# GPT medium-reasoning configs. In the currently installed Inspect Bedrock
# provider, Claude-on-Bedrock adaptive thinking effort is not wired through from
# reasoning_effort yet; see run notes before treating this as confirmed adaptive
# thinking=medium on the wire.
#
# Usage:
#   uv run python scripts/run_models.py configs/config-all-bare-sonnet4.6-high.yaml
#   uv run inspect eval refusal_eval/task.py --model bedrock/us.anthropic.claude-sonnet-4-6 \
#       -T config_path=configs/config-all-bare-sonnet4.6-high.yaml

agent: "basic"
mode: "multistep"
refusal_token: true

assistant_turn_limit: 50
tool_timeout: 180

validated: true

sandbox_resources:
  default:
    memory: 6g
    cpus: 3
    pids_limit: 1024
  target:
    memory: 6g
    cpus: 2
    pids_limit: 1024
  oracle:
    memory: 512m
    cpus: 0.5
  grader:
    memory: 1g
    cpus: 1
  controller:
    memory: 512m
    cpus: 0.5


models:
  - "bedrock/us.anthropic.claude-sonnet-4-6"

judge:
  model: "openai/gpt-5.1"

framings:
  - "bare"

task_order: "validated_first"

task:
  benchmark:
    - source: cybench
      manifest: benchmark/cybench/manifest.yaml

    - source: cybergym
      manifest: benchmark/cybergym/manifest.yaml

    - source: exploitdb
      manifest: benchmark/exploitdb/manifest.yaml

    - source: vulhub
      manifest: benchmark/vulhub/manifest.yaml
      # Upstream image vulhub/craftcms:5.6.16 is missing from Docker Hub.
      exclude_tasks:
        - "craftcms_CVE-2025-32432"
