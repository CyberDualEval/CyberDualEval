# Full benchmark, bare framing, Claude Opus 4.6 on Bedrock.
#
# AWS lists the Bedrock Runtime model ID as anthropic.claude-opus-4-6-v1 and
# the US cross-region inference ID as us.anthropic.claude-opus-4-6-v1.
#
# Usage:
#   source .env
#   CYBERAGENTBENCH_IMAGE_MIRROR= uv run python scripts/run_models.py \
#     configs/config-all-bare-opus4.7.yaml --max-samples 4 --max-connections 4 \
#     --continue-on-fail --retry-on-error=1

agent: "basic"
mode: "multistep"
refusal_token: true
assistant_turn_limit: 50
tool_timeout: 180

sandbox_resources:
  default:
    memory: 6g
    cpus: 3
    pids_limit: 1024
  target:
    memory: 6g
    cpus: 2
    pids_limit: 1024
  oracle:
    memory: 512m
    cpus: 0.5
  grader:
    memory: 1g
    cpus: 1
  controller:
    memory: 512m
    cpus: 0.5

models:
  - "bedrock/us.anthropic.claude-opus-4-6-v1"

judge:
  model: "openai/gpt-5.1"

framings:
  - "bare"

task_order: "validated_first"

task:
  benchmark:
    - source: cybench
      manifest: benchmark/cybench/manifest.yaml

    - source: cybergym
      manifest: benchmark/cybergym/manifest.yaml

    - source: exploitdb
      manifest: benchmark/exploitdb/manifest.yaml

    - source: vulhub
      manifest: benchmark/vulhub/manifest.yaml
      # Upstream image vulhub/craftcms:5.6.16 is missing from Docker Hub.
      exclude_tasks:
        - "craftcms_CVE-2025-32432"
